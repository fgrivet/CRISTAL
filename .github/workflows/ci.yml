name: CI

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  workflow_dispatch: # Manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # 1. PYLINT + TESTS + COVERAGE
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e .[dev]

      - name: Run Pylint
        run: |
          pylint cristal --rcfile=.pylintrc --output-format=json2:pylint_report.json || true

      - name: Run tests with coverage
        run: |
          pytest --cov=cristal --cov-report=json:coverage.json --cov-report=term --cov-report=html

      - name: Generate badges
        run: |
          python docs/scripts/generate_badge_endpoint.py pylint_report.json docs/source/_static/pylint_badge.json pylint
          python docs/scripts/generate_badge_endpoint.py coverage.json docs/source/_static/coverage_badge.json coverage

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/

      - name: Upload badge JSON files
        uses: actions/upload-artifact@v4
        with:
          name: badges
          path: |
            docs/source/_static/pylint_badge.json pylint
            docs/source/_static/coverage_badge.json coverage

  # 2. BUILD DOCS + DEPLOY
  docs:
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Download coverage HTML
        uses: actions/download-artifact@v4
        with:
          name: coverage-html
          path: htmlcov

      - name: Download badge JSON files
        uses: actions/download-artifact@v4
        with:
          name: badges
          path: docs/source/_static/

      - name: Build Sphinx docs
        run: |
          cd docs
          sphinx-build -b html source build/html

      # - name: Copy coverage to docs
      #   run: |
      #     mkdir -p docs/build/html/coverage
      #     cp -r htmlcov/* docs/build/html/coverage/

      # - name: Copy badges to docs
      #   run: |
      #     cp -r docs/source/_static/*.json docs/build/html/_static/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
