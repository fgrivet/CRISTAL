<svg width="545" height="235" viewBox="20 12 545 235" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="cristalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F8EF7"/>
      <stop offset="100%" stop-color="#5f41fa"/>
    </linearGradient>

    <radialGradient id="anomalyGlow">
      <stop offset="0%" stop-color="#FF4D6D" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF4D6D" stop-opacity="0"/>
    </radialGradient>

    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="5" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Crystal Outer Shape -->
  <polygon points="140,20 210,60 240,130 210,200 140,240 70,200 40,130 70,60"
           fill="none"
           stroke="url(#cristalGradient)"
           stroke-width="6"/>


  <!-- Level Set Curve -->
  <ellipse cx="140" cy="130" rx="45" ry="40"
           fill="none"
           stroke="#4F8EF7"
           stroke-dasharray="6 6"
           stroke-width="2"/>

  <!-- Nominal Points -->
  <circle cx="120" cy="120" r="6" fill="#5f41fa"/>
  <circle cx="160" cy="140" r="6" fill="#5f41fa"/>
  <circle cx="135" cy="150" r="6" fill="#5f41fa"/>
  <circle cx="155" cy="110" r="6" fill="#5f41fa"/>

  <!-- Anomaly Glow -->
  <circle cx="190" cy="75" r="20" fill="url(#anomalyGlow)"/>

  <!-- Anomaly Point -->
  <circle cx="190" cy="75" r="7" fill="#FF4D6D"/>

  <!-- Text: CRISTAL -->
  <text x="270" y="135"
        font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif"
        font-size="72"
        font-weight="700"
        fill="url(#cristalGradient)">
    CRISTAL
  </text>

  <!-- Subtitle -->
  <text x="290" y="170"
        font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif"
        font-size="20"
        fill="#888">
    Christoffel <tspan fill="#FF4D6D" filter="url(#textGlow)">Anomaly</tspan> Locator
  </text>

</svg>